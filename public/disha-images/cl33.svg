<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Partial S-curve graph, Jan-Apr visible, May-Aug unknown -->
  <!-- Axes -->
  <line x1="50" y1="170" x2="290" y2="170" stroke="#004877" stroke-width="1.5"/>
  <line x1="50" y1="20" x2="50" y2="170" stroke="#004877" stroke-width="1.5"/>
  <!-- Y labels -->
  <text x="44" y="170" text-anchor="end" font-size="9" fill="#666">0</text>
  <text x="44" y="140" text-anchor="end" font-size="9" fill="#666">25</text>
  <text x="44" y="110" text-anchor="end" font-size="9" fill="#666">50</text>
  <text x="44" y="80" text-anchor="end" font-size="9" fill="#666">75</text>
  <text x="44" y="50" text-anchor="end" font-size="9" fill="#666">100</text>
  <text x="20" y="100" font-size="9" fill="#666" transform="rotate(-90 20 100)">Value</text>
  <!-- X labels -->
  <text x="70" y="182" text-anchor="middle" font-size="9" fill="#666">Jan</text>
  <text x="100" y="182" text-anchor="middle" font-size="9" fill="#666">Feb</text>
  <text x="130" y="182" text-anchor="middle" font-size="9" fill="#666">Mar</text>
  <text x="160" y="182" text-anchor="middle" font-size="9" fill="#666">Apr</text>
  <text x="190" y="182" text-anchor="middle" font-size="9" fill="#aaa">May</text>
  <text x="220" y="182" text-anchor="middle" font-size="9" fill="#aaa">Jun</text>
  <text x="250" y="182" text-anchor="middle" font-size="9" fill="#aaa">Jul</text>
  <text x="280" y="182" text-anchor="middle" font-size="9" fill="#aaa">Aug</text>
  <text x="175" y="195" text-anchor="middle" font-size="9" fill="#666">Month →</text>
  <!-- Visible data points Jan-Apr (S-curve, decelerating) -->
  <circle cx="70" cy="165" r="5" fill="#1a3a6b"/>
  <circle cx="100" cy="140" r="5" fill="#1a3a6b"/>
  <circle cx="130" cy="110" r="5" fill="#1a3a6b"/>
  <circle cx="160" cy="88" r="5" fill="#1a3a6b"/>
  <path d="M70,165 Q85,152 100,140 Q115,125 130,110 Q148,96 160,88" fill="none" stroke="#1a3a6b" stroke-width="2"/>
  <!-- Projected S-curve continuation (dashed) -->
  <path d="M160,88 Q175,78 190,74 Q210,70 230,72 Q255,74 280,76" fill="none" stroke="#27ae60" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="190" cy="74" r="4" fill="#27ae60" opacity="0.6"/>
  <circle cx="220" cy="72" r="4" fill="#27ae60" opacity="0.6"/>
  <circle cx="250" cy="73" r="4" fill="#27ae60" opacity="0.6"/>
  <circle cx="280" cy="76" r="4" fill="#27ae60" opacity="0.6"/>
  <text x="290" y="72" font-size="9" fill="#27ae60" font-weight="bold">B ✓</text>
  <text x="290" y="82" font-size="8" fill="#27ae60">S-curve,</text>
  <text x="290" y="91" font-size="8" fill="#27ae60">plateaus</text>
  <text x="290" y="100" font-size="8" fill="#27ae60">~80</text>
