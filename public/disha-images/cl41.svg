<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Gear A (large, left) -->
  <circle cx="80" cy="90" r="55" fill="none" stroke="#1a3a6b" stroke-width="3"/>
  <circle cx="80" cy="90" r="42" fill="#c8d9f0" stroke="#1a3a6b" stroke-width="1.5"/>
  <!-- Gear teeth A -->
  <g stroke="#1a3a6b" stroke-width="3" fill="none">
    <line x1="80" y1="32" x2="80" y2="18"/>
    <line x1="104" y1="38" x2="112" y2="26"/>
    <line x1="121" y1="57" x2="132" y2="50"/>
    <line x1="126" y1="83" x2="140" y2="82"/>
    <line x1="118" y1="108" x2="130" y2="115"/>
    <line x1="101" y1="127" x2="110" y2="138"/>
    <line x1="77" y1="136" x2="77" y2="150"/>
    <line x1="53" y1="127" x2="45" y2="138"/>
    <line x1="38" y1="108" x2="26" y2="115"/>
    <line x1="32" y1="83" x2="18" y2="82"/>
    <line x1="40" y1="57" x2="28" y2="50"/>
    <line x1="56" y1="38" x2="48" y2="26"/>
  </g>
  <text x="80" y="86" text-anchor="middle" font-size="13" fill="#004877" font-weight="bold">A</text>
  <text x="80" y="100" text-anchor="middle" font-size="10" fill="#004877">Large</text>
  <text x="80" y="160" text-anchor="middle" font-size="9" fill="#e07020">↺ 10rpm CW</text>

  <!-- Gear B (medium, centre) -->
  <circle cx="210" cy="90" r="38" fill="none" stroke="#27ae60" stroke-width="2.5"/>
  <circle cx="210" cy="90" r="28" fill="#c8f0d9" stroke="#27ae60" stroke-width="1.5"/>
  <g stroke="#27ae60" stroke-width="2.5" fill="none">
    <line x1="210" y1="50" x2="210" y2="40"/>
    <line x1="232" y1="57" x2="240" y2="49"/>
    <line x1="242" y1="80" x2="252" y2="80"/>
    <line x1="232" y1="122" x2="240" y2="130"/>
    <line x1="210" y1="128" x2="210" y2="140"/>
    <line x1="188" y1="122" x2="180" y2="130"/>
    <line x1="178" y1="80" x2="168" y2="80"/>
    <line x1="188" y1="57" x2="180" y2="49"/>
  </g>
  <text x="210" y="86" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">B</text>
  <text x="210" y="100" text-anchor="middle" font-size="10" fill="#27ae60">Medium</text>
  <text x="210" y="155" text-anchor="middle" font-size="9" fill="#27ae60">↻ CCW</text>
  <!-- mesh contact point A-B -->
  <circle cx="143" cy="90" r="5" fill="#e07020"/>

  <!-- Gear C (small, right) -->
  <circle cx="283" cy="90" r="22" fill="none" stroke="#c07020" stroke-width="2"/>
  <circle cx="283" cy="90" r="16" fill="#f0d8b0" stroke="#c07020" stroke-width="1.5"/>
  <text x="283" y="86" text-anchor="middle" font-size="11" fill="#c07020" font-weight="bold">C</text>
  <text x="283" y="99" text-anchor="middle" font-size="9" fill="#c07020">Small</text>
  <text x="283" y="140" text-anchor="middle" font-size="9" fill="#c07020">↺ CW faster</text>
  <!-- mesh contact point B-C -->
  <circle cx="250" cy="90" r="4" fill="#27ae60"/>
</svg>
