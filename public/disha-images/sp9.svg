<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Large outer triangle -->
  <polygon points="130,15 240,215 20,215" fill="none" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Subdividing lines creating internal triangles -->
  <!-- Horizontal row 1 (1/3 from top) -->
  <line x1="90" y1="82" x2="170" y2="82" stroke="#1a6b4a" stroke-width="1.8"/>
  <!-- Horizontal row 2 (2/3 from top) -->
  <line x1="50" y1="148" x2="210" y2="148" stroke="#1a6b4a" stroke-width="1.8"/>
  <!-- Left diagonal lines -->
  <line x1="20" y1="215" x2="170" y2="82" stroke="#c07020" stroke-width="1.8"/>
  <line x1="20" y1="215" x2="210" y2="148" stroke="#c07020" stroke-width="1.5" opacity="0.5"/>
  <!-- Right diagonal lines -->
  <line x1="240" y1="215" x2="90" y2="82" stroke="#c07020" stroke-width="1.8"/>
  <line x1="240" y1="215" x2="50" y2="148" stroke="#c07020" stroke-width="1.5" opacity="0.5"/>
  <!-- vertical from apex -->
  <line x1="130" y1="15" x2="130" y2="215" stroke="#1a6b4a" stroke-width="1.5" opacity="0.5"/>

  <text x="130" y="240" text-anchor="middle" font-size="11" fill="#666">Count ALL triangles (all sizes)</text>
  <text x="130" y="254" text-anchor="middle" font-size="11" fill="#e07020" font-weight="bold">Answer = 16</text>
</svg>
