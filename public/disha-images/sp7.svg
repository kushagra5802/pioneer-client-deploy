<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Rangoli pattern with hidden equilateral triangle -->
  <circle cx="140" cy="140" r="10" fill="#1a3a6b"/>
  <!-- 8 petals radiating outward -->
  <g>
    <ellipse cx="140" cy="90" rx="14" ry="34" fill="#e8c060" opacity="0.85"/>
    <ellipse cx="140" cy="190" rx="14" ry="34" fill="#e8c060" opacity="0.85"/>
    <ellipse cx="90" cy="140" rx="34" ry="14" fill="#e8c060" opacity="0.85"/>
    <ellipse cx="190" cy="140" rx="34" ry="14" fill="#e8c060" opacity="0.85"/>
    <!-- diagonal petals -->
    <ellipse cx="105" cy="105" rx="14" ry="34" fill="#e8c060" opacity="0.75" transform="rotate(-45 105 105)"/>
    <ellipse cx="175" cy="105" rx="14" ry="34" fill="#e8c060" opacity="0.75" transform="rotate(45 175 105)"/>
    <ellipse cx="105" cy="175" rx="14" ry="34" fill="#e8c060" opacity="0.75" transform="rotate(45 105 175)"/>
    <ellipse cx="175" cy="175" rx="14" ry="34" fill="#e8c060" opacity="0.75" transform="rotate(-45 175 175)"/>
  </g>
  <!-- decorative dots -->
  <circle cx="140" cy="62" r="5" fill="#e07020"/>
  <circle cx="100" cy="85" r="4" fill="#e07020"/>
  <circle cx="180" cy="85" r="4" fill="#e07020"/>
  <!-- Hidden equilateral triangle (shown with dashed outline as key) -->
  <polygon points="140,72 195,165 85,165" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
  <text x="140" y="258" text-anchor="middle" font-size="10" fill="#e74c3c">Hidden shape shown with dashed outline ↑</text>
  <text x="140" y="272" text-anchor="middle" font-size="9" fill="#888">(In the actual test, no dashed outline is shown)</text>
</svg>
