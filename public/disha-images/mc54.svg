<svg viewBox="0 0 620 160" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <text x="310" y="14" text-anchor="middle" font-size="11" fill="#5A6E75">Develop each squiggle into a complete drawing and give it an unusual title (4 minutes)</text>

  <!-- Squiggle 1: S-curve -->
  <rect x="10" y="22" width="108" height="108" rx="8" fill="white" stroke="#C8D8DC" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M30,82 Q50,42 70,82 Q90,122 110,82" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <text x="64" y="144" text-anchor="middle" font-size="10" fill="#8A9A9A">1: S-curve</text>

  <!-- Squiggle 2: Cross / plus -->
  <rect x="128" y="22" width="108" height="108" rx="8" fill="white" stroke="#C8D8DC" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="182" y1="36" x2="182" y2="88" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="62" x2="214" y2="62" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <text x="182" y="144" text-anchor="middle" font-size="10" fill="#8A9A9A">2: Cross</text>

  <!-- Squiggle 3: Open arch -->
  <rect x="246" y="22" width="108" height="108" rx="8" fill="white" stroke="#C8D8DC" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M264,112 Q300,38 336,112" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="144" text-anchor="middle" font-size="10" fill="#8A9A9A">3: Open arch</text>

  <!-- Squiggle 4: Circle + tail -->
  <rect x="364" y="22" width="108" height="108" rx="8" fill="white" stroke="#C8D8DC" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="418" cy="66" r="24" fill="none" stroke="#1B3A5C" stroke-width="3"/>
  <line x1="418" y1="90" x2="418" y2="118" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <text x="418" y="144" text-anchor="middle" font-size="10" fill="#8A9A9A">4: Circle + tail</text>

  <!-- Squiggle 5: Jagged line -->
  <rect x="482" y="22" width="128" height="108" rx="8" fill="white" stroke="#C8D8DC" stroke-width="2" stroke-dasharray="6,3"/>
  <polyline points="496,98 516,48 540,78 560,42 580,62 600,50" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="546" y="144" text-anchor="middle" font-size="10" fill="#8A9A9A">5: Jagged line</text>
</svg>
