<svg viewBox="0 0 240 260" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Pressure cooker ~70% visible (top cropped slightly) -->
  <!-- Safety valve on top -->
  <rect x="108" y="30" width="24" height="14" rx="4" fill="#1a3a6b"/>
  <!-- Lid -->
  <rect x="55" y="44" width="130" height="18" rx="5" fill="#1a3a6b"/>
  <!-- Side handles -->
  <rect x="30" y="52" width="28" height="12" rx="4" fill="#1a3a6b"/>
  <rect x="182" y="52" width="28" height="12" rx="4" fill="#1a3a6b"/>
  <!-- Main body (domed) -->
  <ellipse cx="120" cy="65" rx="65" ry="8" fill="#243a5e"/>
  <rect x="55" y="65" width="130" height="90" fill="#1a3a6b"/>
  <ellipse cx="120" cy="155" rx="65" ry="20" fill="#243a5e"/>
  <!-- gasket line -->
  <line x1="55" y1="72" x2="185" y2="72" stroke="#3bbee8" stroke-width="1.5" opacity="0.5"/>
  <!-- whistle weight -->
  <circle cx="120" cy="33" r="7" fill="#3a5888"/>

  <text x="120" y="198" text-anchor="middle" font-size="10" fill="#888">~70% visible — what is this object?</text>
  <rect x="30" y="20" width="180" height="175" fill="none" stroke="#004877" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
</svg>
