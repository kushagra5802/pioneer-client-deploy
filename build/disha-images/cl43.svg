<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Same pressure head label -->
  <rect x="80" y="8" width="160" height="22" rx="5" fill="#FEF9EE" stroke="#C47A00" stroke-width="1.5"/>
  <text x="160" y="23" text-anchor="middle" font-size="11" fill="#C47A00" font-weight="bold">Same Pressure Head</text>

  <!-- Pipe A (narrow, diameter 4cm) -->
  <rect x="44" y="35" width="20" height="90" rx="4" fill="none" stroke="#1B3A5C" stroke-width="2.5"/>
  <rect x="47" y="38" width="14" height="84" rx="2" fill="#C8E6F5" opacity="0.5"/>
  <!-- Flow arrows A (few, thin) -->
  <line x1="50" y1="128" x2="50" y2="145" stroke="#5A9DC0" stroke-width="2" marker-end="url(#arrA1)"/>
  <line x1="58" y1="128" x2="58" y2="145" stroke="#5A9DC0" stroke-width="2" marker-end="url(#arrA1)"/>
  <defs>
    <marker id="arrA1" markerWidth="5" markerHeight="5" refX="2" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#5A9DC0"/>
    </marker>
  </defs>
  <text x="54" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B3A5C">Pipe A</text>
  <text x="54" y="177" text-anchor="middle" font-size="10" fill="#5A6E75">d = 4 cm</text>

  <!-- Pipe B (wide, diameter 8cm) -->
  <rect x="196" y="35" width="48" height="90" rx="4" fill="none" stroke="#0E7C7B" stroke-width="2.5"/>
  <rect x="200" y="39" width="40" height="82" rx="2" fill="#C8F0F0" opacity="0.5"/>
  <!-- Flow arrows B (many, wider) -->
  <line x1="202" y1="128" x2="202" y2="145" stroke="#0E7C7B" stroke-width="2" marker-end="url(#arrB1)"/>
  <line x1="210" y1="128" x2="210" y2="145" stroke="#0E7C7B" stroke-width="2" marker-end="url(#arrB1)"/>
  <line x1="220" y1="128" x2="220" y2="145" stroke="#0E7C7B" stroke-width="2" marker-end="url(#arrB1)"/>
  <line x1="230" y1="128" x2="230" y2="145" stroke="#0E7C7B" stroke-width="2" marker-end="url(#arrB1)"/>
  <line x1="238" y1="128" x2="238" y2="145" stroke="#0E7C7B" stroke-width="2" marker-end="url(#arrB1)"/>
  <defs>
    <marker id="arrB1" markerWidth="5" markerHeight="5" refX="2" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#0E7C7B"/>
    </marker>
  </defs>
  <text x="220" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#0E7C7B">Pipe B</text>
  <text x="220" y="177" text-anchor="middle" font-size="10" fill="#5A6E75">d = 8 cm</text>

  <!-- Area comparison box -->
  <rect x="100" y="60" width="88" height="62" rx="6" fill="#F4F8FA" stroke="#C8D8DC" stroke-width="1.5"/>
  <text x="144" y="76" text-anchor="middle" font-size="9" fill="#5A6E75">Area ∝ r²</text>
  <rect x="112" y="82" width="14" height="14" fill="#C8E6F5" stroke="#1B3A5C" stroke-width="1"/>
  <text x="135" y="93" font-size="8" fill="#1B3A5C">A: π×2²=4π</text>
  <rect x="112" y="100" width="28" height="14" fill="#C8F0F0" stroke="#0E7C7B" stroke-width="1"/>
  <text x="150" y="111" font-size="8" fill="#0E7C7B">B: π×4²=16π</text>
  <text x="144" y="126" text-anchor="middle" font-size="10" fill="#1A6B3A" font-weight="bold">B ≈ 4× more</text>
</svg>
