<svg viewBox="0 0 240 260" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Odisha map outline: roughly triangular, elongated, coastline on east -->
  <path d="M100,20 L145,25 L175,40 L185,70 L178,110 L165,145 L148,170 L130,190 L112,200 L95,190 L75,165 L60,140 L55,110 L58,80 L68,55 L82,32 Z"
    fill="#9bbde0" stroke="#004877" stroke-width="2" opacity="0.8"/>
  <!-- Bay of Bengal label on right -->
  <text x="185" y="120" font-size="9" fill="#3bbee8">Bay of Bengal →</text>
  <!-- Capital dot -->
  <circle cx="118" cy="130" r="6" fill="#e07020"/>
  <text x="118" y="148" text-anchor="middle" font-size="9" fill="#e07020">Capital?</text>
  <!-- Blurred/fragmented effect: clip some edges -->
  <path d="M155,150 L165,145 L170,160 L158,165 Z" fill="#f0f4f8" opacity="0.7"/>
  <path d="M60,140 L55,110 L48,125 Z" fill="#f0f4f8" opacity="0.6"/>
  <text x="120" y="230" text-anchor="middle" font-size="10" fill="#666">Fragmented outline — identify the state</text>
</svg>
