<svg viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Abstract series: shape gains 1 side per step (triangle‚Üísquare‚Üípentagon‚Üíhexagon‚Üíheptagon‚Üíoctagon) -->
  <!-- dot rotates 45¬∞ CW per step -->
  <!-- F1: triangle, dot at top-left (0¬∞) -->
  <text x="40" y="12" text-anchor="middle" font-size="9" fill="#666">F1</text>
  <polygon points="40,25 62,75 18,75" fill="none" stroke="#1a3a6b" stroke-width="2"/>
  <circle cx="22" cy="35" r="5" fill="#e07020"/>

  <!-- F2: square, dot at top-right (45¬∞ CW) -->
  <text x="115" y="12" text-anchor="middle" font-size="9" fill="#666">F2</text>
  <rect x="93" y="25" width="50" height="50" fill="none" stroke="#1a3a6b" stroke-width="2"/>
  <circle cx="143" cy="25" r="5" fill="#e07020"/>

  <!-- F3: pentagon, dot at right (90¬∞) -->
  <text x="195" y="12" text-anchor="middle" font-size="9" fill="#666">F3</text>
  <polygon points="195,22 218,38 210,65 180,65 172,38" fill="none" stroke="#1a3a6b" stroke-width="2"/>
  <circle cx="220" cy="50" r="5" fill="#e07020"/>

  <!-- F4: hexagon, dot at bottom-right (135¬∞) -->
  <text x="275" y="12" text-anchor="middle" font-size="9" fill="#666">F4</text>
  <polygon points="275,22 297,35 297,62 275,75 253,62 253,35" fill="none" stroke="#1a3a6b" stroke-width="2"/>
  <circle cx="295" cy="70" r="5" fill="#e07020"/>

  <!-- F5: heptagon, dot at bottom (180¬∞) -->
  <text x="355" y="12" text-anchor="middle" font-size="9" fill="#666">F5</text>
  <polygon points="355,22 374,30 382,52 370,72 340,72 328,52 336,30" fill="none" stroke="#1a3a6b" stroke-width="2"/>
  <circle cx="355" cy="77" r="5" fill="#e07020"/>

  <text x="400" y="52" font-size="16" fill="#888">‚Üí</text>

  <!-- F6: octagon, dot at bottom-left (225¬∞) - answer -->
  <rect x="415" y="20" width="60" height="80" fill="#fff8e8" stroke="#c07020" stroke-width="2" stroke-dasharray="5,3" rx="4"/>
  <polygon points="445,25 458,28 466,40 466,62 458,74 445,77 432,74 424,62 424,40 432,28" fill="none" stroke="#c07020" stroke-width="2"/>
  <circle cx="426" cy="72" r="5" fill="#e07020"/>
  <text x="445" y="108" text-anchor="middle" font-size="8" fill="#c07020">F6: octagon, dot at 225¬∞</text>
</svg>
