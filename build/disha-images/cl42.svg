<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Sun above both objects -->
  <circle cx="160" cy="22" r="16" fill="#F9C464"/>
  <g stroke="#F9C464" stroke-width="2">
    <line x1="160" y1="2" x2="160" y2="6"/>
    <line x1="160" y1="38" x2="160" y2="42"/>
    <line x1="140" y1="22" x2="136" y2="22"/>
    <line x1="180" y1="22" x2="184" y2="22"/>
    <line x1="146" y1="9" x2="143" y2="6"/>
    <line x1="174" y1="9" x2="177" y2="6"/>
    <line x1="146" y1="35" x2="143" y2="38"/>
    <line x1="174" y1="35" x2="177" y2="38"/>
  </g>
  <text x="160" y="52" text-anchor="middle" font-size="10" fill="#C47A00" font-weight="bold">Same Sunlit Room</text>

  <!-- Ray to diya -->
  <line x1="138" y1="36" x2="75" y2="92" stroke="#F9C464" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Ray to coin -->
  <line x1="182" y1="36" x2="245" y2="92" stroke="#F9C464" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Clay Diya (left) -->
  <ellipse cx="75" cy="130" rx="28" ry="9" fill="#B07050" stroke="#8B5E3C" stroke-width="1.5"/>
  <path d="M48,130 Q55,100 75,98 Q95,100 102,130" fill="#C8956C" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Flame -->
  <ellipse cx="75" cy="93" rx="6" ry="11" fill="#F9C464" opacity="0.85"/>
  <ellipse cx="75" cy="92" rx="3" ry="7" fill="white" opacity="0.5"/>
  <!-- Wick -->
  <line x1="75" y1="98" x2="75" y2="102" stroke="#5A3010" stroke-width="2"/>
  <text x="75" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#8B5E3C">Clay Diya</text>
  <text x="75" y="167" text-anchor="middle" font-size="11" fill="#0E7C7B" font-weight="bold">Feels COOL</text>
  <text x="75" y="178" text-anchor="middle" font-size="9" fill="#5A6E75">(slow conductor)</text>

  <!-- Metal Coin (right) -->
  <ellipse cx="245" cy="128" rx="30" ry="10" fill="#B8B8B8" stroke="#5A5A5A" stroke-width="2"/>
  <ellipse cx="245" cy="120" rx="30" ry="10" fill="#D8D8D8" stroke="#5A5A5A" stroke-width="2"/>
  <ellipse cx="245" cy="114" rx="30" ry="10" fill="#E8E8E8" stroke="#5A5A5A" stroke-width="1.5"/>
  <text x="245" y="117" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">₹</text>
  <text x="245" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#5A5A5A">Metal Coin</text>
  <text x="245" y="167" text-anchor="middle" font-size="11" fill="#B03020" font-weight="bold">Feels HOT</text>
  <text x="245" y="178" text-anchor="middle" font-size="9" fill="#5A6E75">(fast conductor)</text>
</svg>
